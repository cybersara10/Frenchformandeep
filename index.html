<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>French for Mandeep</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    padding:12px;
    color:white;
}

/* HEADER */
h1{
    text-align:center;
    font-size:20px;
    margin-top:10px;
}

.info-box{
    background:white;
    color:black;
    padding:12px;
    border-radius:12px;
    margin:12px auto;
    max-width:600px;
    font-size:13px;
    line-height:1.4;
}

/* GRID */
.alphabet{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(50px,1fr));
    gap:8px;
    margin-top:15px;
}

/* SMALLER LETTERS (FIXED) */
.letter-btn{
    height:48px;
    border:none;
    border-radius:10px;
    background:white;
    color:#5b21b6;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

/* CARD (fixed for iPhone) */
.card{
    background:white;
    color:black;
    margin:15px auto;
    padding:15px;
    border-radius:14px;
    max-width:320px;
    text-align:center;
}

/* BIG LETTER (smaller than before) */
#bigLetter{
    font-size:50px;
    color:#5b21b6;
    margin-bottom:10px;
}

/* BUTTON */
#audioBtn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#5b21b6;
    color:white;
    font-size:15px;
    cursor:pointer;
}

#audioBtn:active{
    transform:scale(0.97);
}

.subtitle{
    text-align:center;
    font-size:12px;
    opacity:0.9;
    margin-top:5px;
}

</style>
</head>

<body>

<h1>🇫🇷 French for Mandeep</h1>
<p class="subtitle">Tap a letter and listen</p>

<div class="info-box">
👉 Start by learning how to pronounce French letters. Tap and listen carefully.
</div>

<div class="alphabet" id="alphabet"></div>

<div class="card">

    <div id="bigLetter">A</div>

    <button id="audioBtn">🔊 Listen</button>

</div>

<script>

const letters = [
{l:"A",s:"a"},
{l:"B",s:"bé"},
{l:"C",s:"cé"},
{l:"D",s:"dé"},
{l:"E",s:"e"},
{l:"F",s:"effe"},
{l:"G",s:"gé"},
{l:"H",s:"ache"},
{l:"I",s:"i"},
{l:"J",s:"ji"},
{l:"K",s:"ka"},
{l:"L",s:"elle"},
{l:"M",s:"emme"},
{l:"N",s:"enne"},
{l:"O",s:"o"},
{l:"P",s:"pé"},
{l:"Q",s:"ku"},
{l:"R",s:"er"},
{l:"S",s:"esse"},
{l:"T",s:"té"},
{l:"U",s:"u"},
{l:"V",s:"vé"},
{l:"W",s:"double vé"},
{l:"X",s:"ix"},
{l:"Y",s:"igrec"},
{l:"Z",s:"zède"}
];

let currentSound = "a";

const container = document.getElementById("alphabet");
const bigLetter = document.getElementById("bigLetter");
const audioBtn = document.getElementById("audioBtn");

/* FIX FOR IPHONE AUDIO (VERY IMPORTANT) */
function speak(text){

    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "fr-FR";
    speech.rate = 0.85;

    speechSynthesis.cancel(); // important for iPhone
    speechSynthesis.speak(speech);
}

letters.forEach(item => {

    const btn = document.createElement("button");
    btn.className = "letter-btn";
    btn.innerText = item.l;

    btn.onclick = () => {

        bigLetter.innerText = item.l;
        currentSound = item.s;

        // auto play on tap (important for mobile)
        speak(currentSound);
    };

    container.appendChild(btn);
});

/* listen button */
audioBtn.onclick = () => {
    speak(currentSound);
};

</script>

</body>
</html>
